<svg viewBox="0 0 300 150" preserveAspectRatio="none" fill="none" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none">
  <path d="M20 6C90 3 150 8 210 5 262 3 294 6 295 22 297 58 293 104 296 130 297 146 278 145 250 146 182 149 110 143 56 147 10 149 5 142 5 128 3 96 7 54 4 24 3 9 12 6 20 6Z" stroke="{{ color }}" stroke-opacity="{{ opacity }}" stroke-width="{{ sw }}" vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</x-dc>
<!-- dc-script props: color(default #3A3125) / opacity(default 0.5) / sw(default 1.4) -->
